<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#050608">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
  {% if page.extra_css %}
  <link rel="stylesheet" href="{{ page.extra_css | relative_url }}">
  {% endif %}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <canvas id="cosmosCanvas" class="cosmos-canvas" aria-hidden="true"></canvas>

  {% include nav.html %}

  <main id="main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/js/site.js' | relative_url }}" defer></script>
  {% if page.extra_js %}
  <script src="{{ page.extra_js | relative_url }}" defer></script>
  {% endif %}
</body>
</html>
