<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: 'Jack Little — Engineering Physics, computational simulations, and research.' }}">
  <meta name="theme-color" content="#07080f">
  <title>{{ page.title }} — Jack Little</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
  {% if page.extra_css %}
  <link rel="stylesheet" href="{{ page.extra_css }}">
  {% endif %}
</head>
<body>

  {% include nav.html %}

  <main id="main">
    {{ content }}
  </main>

  {% include footer.html %}

  {% if page.extra_js %}
  <script src="{{ page.extra_js }}" defer></script>
  {% endif %}

</body>
</html>
