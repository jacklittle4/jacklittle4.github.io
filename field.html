title: Magnetic Field Plotter
permalink: /field/
plotly: true
---

<header>
  <h1>Magnetic Field Plotter</h1>
  <p>Vector field around a current-carrying wire</p>
</header>

<section class="upload-section" style="max-width: 1100px; margin: 0 auto;">
  <div id="fieldPlot" style="width: 100%; height: 70vh; min-height: 500px;"></div>
</section>

<script>
  const x = [], y = [], u = [], v = [];

  for (let i = -10; i <= 10; i++) {
    for (let j = -10; j <= 10; j++) {
      const dx = -j;
      const dy = i;
      const r2 = dx * dx + dy * dy + 0.1;
      const mag = 5 / r2;

      x.push(i);
      y.push(j);
      u.push(mag * dx);
      v.push(mag * dy);
    }
  }

  Plotly.newPlot('fieldPlot', [{
    type: 'quiver',
    x: x,
    y: y,
    u: u,
    v: v,
    line: { color: 'cyan' },
    scale: 0.1
  }], {
    title: 'Magnetic Field Vectors',
    paper_bgcolor: '#0b0c1a',
    plot_bgcolor: '#0b0c1a',
    font: { color: '#e0e0e0' }
  });
</script>
